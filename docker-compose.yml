services:
  web:
    build:
      context: ./KiroHub
      dockerfile: Dockerfile
    container_name: kirohub-web
    environment:
      NODE_ENV: production
      COOKIE_HTTP: ${COOKIE_HTTP:-HTTPS}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

  backend:
    build:
      context: ./KiroHub-Backend
      dockerfile: Dockerfile
    container_name: kirohub-backend
    command: ["sh", "-c", "alembic upgrade heads && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG_LOG: ${DEBUG_LOG:-false}
      USAGE_LOG_REDACT_HEADERS: ${USAGE_LOG_REDACT_HEADERS:-true}

      # 数据库配置
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-kirohub}:${POSTGRES_PASSWORD:-please-change-me}@postgres:5432/${POSTGRES_DB:-kirohub}}

      # Redis配置
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

      # Kiro配置
      KIRO_IDE_VERSION: ${KIRO_IDE_VERSION:-0.9.2}
      KIRO_PROXY_URL: ${KIRO_PROXY_URL:-}

      # 加密密钥（必须配置）
      PLUGIN_API_ENCRYPTION_KEY: ${PLUGIN_API_ENCRYPTION_KEY}

      # JWT配置（必须配置）
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

      # 管理员账号（首次启动自动创建）
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: kirohub-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kirohub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-please-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-kirohub}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kirohub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kirohub} -d ${POSTGRES_DB:-kirohub}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kirohub-redis
    command: redis-server --appendonly yes
    volumes:
      - kirohub_redis_data:/data
    restart: unless-stopped

volumes:
  kirohub_redis_data:
  kirohub_postgres_data:
